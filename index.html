<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurant Page</title>
  <script defer src="main.js"></script></head>
  <body
    class="bg-slate-300 flex flex-col lg:grid lg:grid-cols-[300px_1fr] lg:grid-rows-[100px_1fr] max-w-screen min-h-screen gap-y-2"
  >
    <header
      class=" bg-slate-700 w-full p-4 flex justify-center items-start relative lg:col-start-2 lg:col-end-3 m-0"
    >
      <nav class="p-4 bg-gray-500 border-t-4 rounded-b-lg relative">
        <button
          class="bg-orange-700 p-1 rounded text-white cursor-pointer duration-700 hover:-translate-y-1"
          id="home"
        >
          Home
        </button>
        <button
          class="bg-orange-700 p-1 rounded text-white cursor-pointer duration-700 hover:-translate-y-1"
          id="menu"
        >
          Menu
        </button>
        <button
          class="bg-orange-700 p-1 rounded text-white cursor-pointer duration-700 hover:-translate-y-1"
          id="contact"
        >
          Contact
        </button>
      </nav>
      <div
        class="burger lg:hidden flex flex-col items-center justify-evenly gap-1 fixed right-10 bg-gray-600 p-2 rounded hover:opacity-45"
      >
        <span class="w-5 h-1 bg-white"></span>
        <span class="w-5 h-1 bg-white"></span>
        <span class="w-5 h-1 bg-white"></span>
      </div>
    </header>
    <aside
      class="hidden lg:flex flex-col col-start-1 col-end-2 row-start-1 row-end-3 bg-gray-900 border-r-8 border-r-slate-500 p-4 m-0"
    >
      <div class="w-full p-4 bg-orange-900 rounded">
        <h3 class="text-xl text-stone-200">Some Pictures</h3>
      </div>
      <div class="grid w-full grid-rows-4 gap-2 mt-4">
        <div
          class="bg-sky-300 p-4 text-center border-l-red-500 border-l-4 rounded-r"
        >
          Picture
        </div>
        <div
          class="bg-sky-300 p-4 text-center border-l-red-500 border-l-4 rounded-r"
        >
          Picture
        </div>
        <div
          class="bg-sky-300 p-4 text-center border-l-red-500 border-l-4 rounded-r"
        >
          Picture
        </div>
        <div
          class="bg-sky-300 p-4 text-center border-l-red-500 border-l-4 rounded-r"
        >
          Picture
        </div>
      </div>
      <div
        class="w-full bg-blue-400 mt-4 h-full rounded border-gray-500 border-4 p-4 flex flex-col"
      >
        <p class="text-center text-white">Some ADS</p>
        <hr />
        <div class="w-full mt-4 p-4">
          <div class="ads bg-cyan-300 w-3/4 p-2 rounded m-2">Ad1</div>
          <div class="ads bg-cyan-300 w-3/4 p-2 rounded m-2">Ad2</div>
          <div class="ads bg-cyan-300 w-3/4 p-2 rounded m-2">Ad3</div>
          <div class="ads bg-cyan-300 w-3/4 p-2 rounded m-2">Ad4</div>
        </div>
      </div>
    </aside>
    <main
      id="content"
      class="max-w-full min-h-full flex flex-col items-center justify-center"
    ></main>
  </body>
</html>
